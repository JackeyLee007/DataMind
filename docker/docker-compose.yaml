services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:17.9
    container_name: datamind-postgres
    environment:
      POSTGRES_USER: datamind
      POSTGRES_PASSWORD: datamind123
      POSTGRES_DB: datamind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datamind"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 后端 API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: datamind-backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://datamind:datamind123@postgres:5432/datamind
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # 前端 Next.js
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: datamind-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
